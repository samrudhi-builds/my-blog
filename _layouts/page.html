---
layout: default
---
<div class="page-header">
  <div class="container">
    <div class="section-label">{{ page.label | default: "// page" }}</div>
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p>{{ page.description }}</p>{% endif %}
  </div>
</div>
<div class="container" style="padding-bottom:4rem;">
  {{ content }}
</div>
